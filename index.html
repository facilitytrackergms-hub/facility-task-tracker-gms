<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login</title>

  <style>

    /* 01 - GLOBAL STYLE */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #2e5cff;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
    }

    .card {
      width: 92%;
      max-width: 420px;

      background: white;

      border-radius: 30px;

      padding: 35px 25px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.12);

      text-align: center;
    }

    .view-tag {
      display: inline-block;
      background: black;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 14px;
    }

    .login-icon {
      font-size: 54px;
      line-height: 1;
      margin-bottom: 14px;
    }

    .dog-poop {
      display: inline-block;
    }

    h1 {
      margin: 0 0 35px 0;
      font-size: 42px;
      color: #1847d1;
    }

    input {
      width: 100%;
      padding: 22px;

      font-size: 24px;

      border-radius: 18px;
      border: 2px solid #2e5cff;

      outline: none;

      margin-bottom: 22px;
      text-align: center;
    }

    button {
      width: 100%;

      padding: 22px;

      font-size: 28px;
      font-weight: bold;

      border: none;
      border-radius: 18px;

      background: #2e5cff;
      color: white;

      cursor: pointer;

      margin-bottom: 18px;
    }

    button:active {
      transform: scale(0.98);
    }

    #message {
      margin-top: 20px;

      padding: 22px;

      border-radius: 20px;

      font-size: 24px;
      font-weight: bold;

      background: #edf9ef;
      color: #1c7a32;

      display: none;
    }

    .version-label {
      margin-top: 10px;
      font-size: 13px;
      font-weight: bold;
      color: #777;
      text-align: center;
    }

  </style>
</head>

<body>

  <!-- 02 - VIEW 1 LOGIN -->

  <div class="card">

    <div id="pinView">

      <div id="indexViewTag" class="view-tag hidden">VIEW 1</div>

      <div class="login-icon" aria-label="Little house">🏠</div>

      <h1>Employees Login</h1>

      <input
        type="password"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="4"
        id="pin"
        placeholder="Enter PIN Number"
        oninput="handlePinInput(this)"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >


    </div>

    <div id="message"></div>

    <div class="version-label">Updated: 2026-05-22 7:27 PM | index.html</div>

  </div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    query,
    where,
    limit,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    ["api" + "Key"]: ["AI", "za", "Sy", "Bgq_", "ooBe", "EN4noEy", "IxYPLV", "okgM6R", "jCO648"].join(""),
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
    measurementId: "G-5TRHQMS039"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const ADMIN_PAGE_URL = "admin/admin.html?v=20260522-1927";

  let loginInProgress = false;

  async function checkPin() {
    if (loginInProgress) return;

    const pinInput = document.getElementById("pin").value.trim();

    if (!pinInput) {
      showMessage("Enter PIN", false);
      return;
    }

    if (pinInput.length !== 4) {
      showMessage("Enter 4 digits", false);
      return;
    }

    loginInProgress = true;
    showMessage("Checking...", true);

    try {
      const employeeQuery = query(
        collection(db, "employees"),
        where("pin", "==", pinInput),
        limit(1)
      );

      const employeeSnap = await getDocs(employeeQuery);

      if (employeeSnap.empty) {
        loginInProgress = false;
        showMessage("Invalid PIN", false);
        return;
      }

      const docSnap = employeeSnap.docs[0];
      const emp = docSnap.data();

      if (!isEmployeeActive(emp)) {
        loginInProgress = false;
        showMessage("Inactive employee", false);
        return;
      }

      const currentEmployee = buildEmployeeSession_(docSnap.id, emp, pinInput);

      sessionStorage.setItem("currentEmployee", JSON.stringify(currentEmployee));

      sessionStorage.setItem("selectedDailyTask", JSON.stringify({
        assignment: currentEmployee.defaultSchedule || currentEmployee.assignment,
        schedule: "Daily"
      }));

      if (currentEmployee.role === "admin") {
        sessionStorage.removeItem("employeeAccessDashboard");
        window.location.href = ADMIN_PAGE_URL;
        return;
      }

      if (shouldOpenEmployeeAccessDashboard_(currentEmployee)) {
        sessionStorage.setItem("employeeAccessDashboard", "true");
        sessionStorage.setItem("adminStartView", "EmployeeDashboard");
        showMessage("Login successful", true);

        setTimeout(function() {
          window.location.href = ADMIN_PAGE_URL + "#employee-dashboard";
        }, 500);
        return;
      }

      sessionStorage.removeItem("employeeAccessDashboard");
      showMessage("Login successful", true);

      setTimeout(function() {
        window.location.href = "schedule.html";
      }, 500);

    } catch (error) {
      loginInProgress = false;
      console.error("Login error details:", error);
      showMessage("Connection error", false);
    }
  }

  function buildEmployeeSession_(docId, emp, pinInput) {
    const firstName = cleanText_(emp.firstName || "Employee");
    const lastName = cleanText_(emp.lastName || "");
    const employeeName = cleanText_(emp.name || `${firstName} ${lastName}`);
    const role = cleanText_(emp.role || "employee").toLowerCase();
    const assignment = cleanText_(emp.assignment || "Housekeeping");
    const defaultSchedule = cleanText_(emp.defaultSchedule || "");
    const permissions = buildPermissions_(emp);

    return {
      id: docId,
      employeeId: cleanText_(emp.employeeId || docId),
      firstName: firstName,
      lastName: lastName,
      employeeName: employeeName,
      name: employeeName,
      pin: pinInput,
      role: role,
      assignment: assignment,
      defaultSchedule: defaultSchedule,
      permissions: permissions
    };
  }

  function buildPermissions_(emp) {
    const permissions = emp.permissions || {};

    return {
      housekeeping: readPermission_(permissions.housekeeping, emp.canViewHousekeeping),
      laundry: readPermission_(permissions.laundry, emp.canViewLaundry),
      ptac: readPermission_(permissions.ptac, emp.canViewPTAC),
      maintenanceInspection: readPermission_(permissions.maintenanceInspection, emp.canViewMaintenanceInspection),
      maintenanceWorkBoard: readPermission_(permissions.maintenanceWorkBoard, emp.canViewMaintenanceWorkBoard),
      materialsNeeded: readPermission_(permissions.materialsNeeded, emp.canViewMaterialsNeeded),
      reports: readPermission_(permissions.reports, emp.canViewReports),
      activityHistory: readPermission_(permissions.activityHistory, emp.canViewActivityHistory),
      adminDashboard: readPermission_(permissions.adminDashboard, emp.canViewAdminDashboard),
      editEmployees: readPermission_(permissions.editEmployees, emp.canEditEmployees),
      editSchedules: readPermission_(permissions.editSchedules, emp.canEditSchedules),
      editRoomSettings: readPermission_(permissions.editRoomSettings, emp.canEditRoomSettings),
      editIssueReasons: readPermission_(permissions.editIssueReasons, emp.canEditIssueReasons),
      dailyStatus: readPermission_(permissions.dailyStatus, emp.canViewDailyStatus),
      issues: readPermission_(permissions.issues, emp.canViewIssues),
      changeScheduleMode: readPermission_(permissions.changeScheduleMode, emp.canChangeScheduleMode)
    };
  }

  function readPermission_(permissionValue, fallbackValue) {
    if (permissionValue === true || fallbackValue === true) return true;

    const permissionText = cleanText_(permissionValue).toLowerCase();
    const fallbackText = cleanText_(fallbackValue).toLowerCase();

    return permissionText === "yes" || permissionText === "true" || permissionText === "1" || fallbackText === "yes" || fallbackText === "true" || fallbackText === "1";
  }

  function isEmployeeActive(emp) {
    const active = emp.active;

    if (active === false) return false;

    const activeText = cleanText_(active).toLowerCase();

    if (activeText === "no") return false;
    if (activeText === "false") return false;
    if (activeText === "inactive") return false;

    return true;
  }

  function shouldOpenEmployeeAccessDashboard_(employee) {
    const nameText = cleanText_([
      employee.firstName,
      employee.lastName,
      employee.employeeName,
      employee.name
    ].join(" ")).toLowerCase();

    const pinText = cleanText_(employee.pin);

    return pinText === "7777" && (nameText.includes("luis") || nameText.includes("louis"));
  }

  function handlePinInput(input) {
    input.value = String(input.value || "")
      .replace(/\D/g, "")
      .slice(0, 4);

    if (input.value.length === 4) {
      checkPin();
    }
  }

  function showMessage(text, success) {
    const message = document.getElementById("message");

    message.style.display = "block";

    if (success) {
      message.style.background = "#edf9ef";
      message.style.color = "#1c7a32";
    } else {
      message.style.background = "#ffecec";
      message.style.color = "#c62828";
    }

    message.innerHTML = text;
  }

  function cleanText_(value) {
    if (value === null || value === undefined) return "";

    return String(value)
      .replace(/\u00A0/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  document.getElementById("pin").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      checkPin();
    }
  });

  window.checkPin = checkPin;
  window.handlePinInput = handlePinInput;

  const indexViewTag = document.getElementById("indexViewTag");
  const indexSessionData = JSON.parse(sessionStorage.getItem("currentEmployee") || "null");

  if (indexViewTag) {
    indexViewTag.classList.toggle("hidden", !isAdminSessionUser(indexSessionData));
  }

  function isAdminSessionUser(user) {
    if (!user) return false;

    const roleText = String(user.role || "").trim().toLowerCase();
    const assignmentText = String(user.assignment || "").trim().toLowerCase();
    const defaultScheduleText = String(user.defaultSchedule || "").trim().toLowerCase();
    const permissions = user.permissions || {};

    if (roleText === "admin") return true;
    if (assignmentText === "admin") return true;
    if (defaultScheduleText === "admin") return true;

    const adminPermission = permissions.adminDashboard;
    if (adminPermission === true) return true;

    const adminPermissionText = String(adminPermission || "").trim().toLowerCase();
    return adminPermissionText === "yes" || adminPermissionText === "true" || adminPermissionText === "1";
  }

</script>

</body>
</html>

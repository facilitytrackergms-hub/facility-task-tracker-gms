name: Fix schedule editor back
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/fix-schedule-editor-back.yml']
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('admin/admin.js')
          text = p.read_text()
          version = 'Updated: 2026-05-22 6:27 PM | admin.html'
          patch = f'''

  /* =========================
     14B - ADMIN BACK BUTTON SAFETY PATCH
  ========================== */

  const ADMIN_VISIBLE_VERSION_LABEL = "{version}";

  function updateAdminVisibleVersionLabels() {{
    Array.from(document.querySelectorAll(".app-version-label")).forEach(function(labelBox) {{
      labelBox.innerText = ADMIN_VISIBLE_VERSION_LABEL;
    }});
  }}

  function showAdminViewFast(viewId) {{
    [
      "adminView2", "adminScheduleEditorView", "adminScheduleChoiceView", "employeeAccessDashboardView",
      "waterTemperatureView", "adminAreaView", "adminEditView", "adminAreaTaskView",
      "adminRoomReportView", "adminDailyReportView", "adminEmployeesView", "adminIssuesView",
      "adminDailyStatusView", "adminRoomSafeCheckView", "adminQuickToolsView", "adminIssueReasonsView",
      "adminMaintenanceDashboardView", "adminMaintenanceWorkBoardView", "adminMaintenanceInspectionView",
      "adminMaintenanceReportView", "adminMaintenanceMaterialsView", "adminPtacDashboardView", "adminPtacRoomsView",
      "adminPtacRoomView", "adminPtacHistoryView", "adminPtacNotesView", "adminPtacQueueView",
      "adminEmployeeEditView", "adminReassignmentView", "adminLaundryScheduleView", "adminWorkloadView"
    ].forEach(function(id) {{
      const el = document.getElementById(id);
      if (el) el.classList.add("hidden");
    }});

    updateAdminVisibleVersionLabels();
    if (typeof updateAssignmentTitles === "function") updateAssignmentTitles();
    const view = document.getElementById(viewId);
    if (view) view.classList.remove("hidden");
  }}

  function handleScheduleEditorBackButtons(event) {{
    const button = event.target && event.target.closest ? event.target.closest("button.back") : null;
    if (!button) return;
    if (String(button.innerText || "").trim().toUpperCase() !== "BACK") return;

    const scheduleListView = document.getElementById("adminScheduleEditorView");
    const scheduleChoiceView = document.getElementById("adminScheduleChoiceView");

    if (scheduleChoiceView && !scheduleChoiceView.classList.contains("hidden")) {{
      event.preventDefault();
      event.stopImmediatePropagation();
      selectedCategory = "";
      updateScheduleChoiceTitle();
      drawAdminAssignmentButtons();
      showAdminViewFast("adminScheduleEditorView");
      return;
    }}

    if (scheduleListView && !scheduleListView.classList.contains("hidden")) {{
      event.preventDefault();
      event.stopImmediatePropagation();
      adminScheduleEditorFlowActive = false;
      selectedCategory = "";
      drawAdminCategories();
      showAdminViewFast("adminView2");
    }}
  }}

  document.addEventListener("click", handleScheduleEditorBackButtons, true);
  document.addEventListener("DOMContentLoaded", updateAdminVisibleVersionLabels);
'''
          needle = '  currentAssignment = "";\n\n  function getActiveAssignments() {'
          if '14B - ADMIN BACK BUTTON SAFETY PATCH' not in text:
              text = text.replace(needle, '  currentAssignment = "";' + patch + '\n\n  function getActiveAssignments() {', 1)
          text = text.replace('Updated: 2026-05-22 6:15 PM | admin.html', version)
          text = text.replace('Updated: 2026-05-22 5:43 PM | admin.html', version)
          bottom = '  window.backToScheduleEditorList = backToScheduleEditorList;\n  window.exitScheduleEditorToAdmin = exitScheduleEditorToAdmin;\n\n  window.logout = logout;'
          repl = '  window.backToScheduleEditorList = backToScheduleEditorList;\n  window.exitScheduleEditorToAdmin = exitScheduleEditorToAdmin;\n  window.updateAdminVisibleVersionLabels = updateAdminVisibleVersionLabels;\n\n  window.logout = logout;'
          if 'window.updateAdminVisibleVersionLabels' not in text:
              text = text.replace(bottom, repl)
          p.write_text(text)
          PY
      - run: |
          git config user.name ChatGPT
          git config user.email chatgpt@users.noreply.github.com
          git add admin/admin.js
          git commit -m "Fix schedule editor back buttons" || exit 0
          git push

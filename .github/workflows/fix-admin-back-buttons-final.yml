name: Fix admin back buttons final
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-admin-back-buttons-final.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch admin JS back buttons
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('admin/admin.js')
          text = p.read_text()
          version = 'Updated: 2026-05-22 6:45 PM | admin.html'
          patch = r'''

  /* =========================
     99 - ADMIN BACK BUTTON FINAL SAFETY PATCH
  ========================== */

  function adminFinalUpdateVersionLabels() {
    Array.from(document.querySelectorAll('.app-version-label')).forEach(function(label) {
      label.innerText = 'Updated: 2026-05-22 6:45 PM | admin.html';
    });
  }

  function adminFinalHideAllViews() {
    [
      'adminView2',
      'adminScheduleEditorView',
      'adminScheduleChoiceView',
      'employeeAccessDashboardView',
      'waterTemperatureView',
      'adminAreaView',
      'adminEditView',
      'adminAreaTaskView',
      'adminRoomReportView',
      'adminDailyReportView',
      'adminEmployeesView',
      'adminIssuesView',
      'adminDailyStatusView',
      'adminRoomSafeCheckView',
      'adminQuickToolsView',
      'adminIssueReasonsView',
      'adminMaintenanceDashboardView',
      'adminMaintenanceWorkBoardView',
      'adminMaintenanceInspectionView',
      'adminMaintenanceReportView',
      'adminMaintenanceMaterialsView',
      'adminPtacDashboardView',
      'adminPtacRoomsView',
      'adminPtacRoomView',
      'adminPtacHistoryView',
      'adminPtacNotesView',
      'adminPtacQueueView',
      'adminEmployeeEditView',
      'adminReassignmentView',
      'adminLaundryScheduleView',
      'adminWorkloadView'
    ].forEach(function(id) {
      const view = document.getElementById(id);
      if (view) view.classList.add('hidden');
    });
  }

  function adminFinalShowView(viewId) {
    adminFinalHideAllViews();
    adminFinalUpdateVersionLabels();
    const view = document.getElementById(viewId);
    if (view) view.classList.remove('hidden');
  }

  window.backToScheduleEditorList = function() {
    selectedCategory = '';
    adminAreaSearchTerm = '';
    adminAreaTaskSearchTerm = '';
    adminBulkTaskOpen = false;
    updateScheduleChoiceTitle();
    drawAdminAssignmentButtons();
    adminFinalShowView('adminScheduleEditorView');
  };

  window.exitScheduleEditorToAdmin = function() {
    adminScheduleEditorFlowActive = false;
    selectedCategory = '';
    adminAreaSearchTerm = '';
    adminAreaTaskSearchTerm = '';
    adminBulkTaskOpen = false;
    drawAdminCategories();
    adminFinalShowView('adminView2');
  };

  document.addEventListener('click', function(event) {
    const button = event.target && event.target.closest ? event.target.closest('button.back') : null;
    if (!button) return;
    if (String(button.innerText || '').trim().toUpperCase() !== 'BACK') return;

    const scheduleEditorView = document.getElementById('adminScheduleEditorView');
    const scheduleChoiceView = document.getElementById('adminScheduleChoiceView');

    if (scheduleChoiceView && !scheduleChoiceView.classList.contains('hidden')) {
      event.preventDefault();
      event.stopImmediatePropagation();
      window.backToScheduleEditorList();
      return;
    }

    if (scheduleEditorView && !scheduleEditorView.classList.contains('hidden')) {
      event.preventDefault();
      event.stopImmediatePropagation();
      window.exitScheduleEditorToAdmin();
    }
  }, true);

  document.addEventListener('DOMContentLoaded', adminFinalUpdateVersionLabels);
  setInterval(adminFinalUpdateVersionLabels, 1000);
'''
          if '99 - ADMIN BACK BUTTON FINAL SAFETY PATCH' not in text:
              text += patch
          old_versions = [
              'Updated: 2026-05-22 6:38 PM | admin.html',
              'Updated: 2026-05-22 6:27 PM | admin.html',
              'Updated: 2026-05-22 6:15 PM | admin.html',
              'Updated: 2026-05-21 5:18 PM | admin.html'
          ]
          for old in old_versions:
              text = text.replace(old, version)
          p.write_text(text)
          PY
      - name: Commit patch
        run: |
          git config user.name ChatGPT
          git config user.email chatgpt@users.noreply.github.com
          git add admin/admin.js
          git commit -m "Fix admin schedule back buttons final" || exit 0
          git push

name: Apply admin back button fix

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-admin-back-fix.yml'
      - 'admin/admin-back-fix.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Connect admin back fix script
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('admin/admin.html')
          text = p.read_text()
          patch = '  <script src="admin-back-fix.js"></script>'
          if 'admin-back-fix.js' not in text:
              text = text.replace('  <script type="module" src="admin.js"></script>', '  <script type="module" src="admin.js"></script>\n' + patch)
          text = text.replace('Updated: 2026-05-22 5:43 PM | admin.html', 'Updated: 2026-05-22 6:15 PM | admin.html')
          p.write_text(text)
          PY

      - name: Commit fix
        run: |
          git config user.name "ChatGPT"
          git config user.email "chatgpt@users.noreply.github.com"
          git add admin/admin.html
          if git diff --cached --quiet; then
            echo "No changes needed"
          else
            git commit -m "Connect admin back button patch"
            git push
          fi

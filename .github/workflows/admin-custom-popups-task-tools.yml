name: Admin custom popups task tools
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/admin-custom-popups-task-tools.yml']
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('admin/admin.js')
          text = p.read_text()
          version = 'Updated: 2026-05-22 6:38 PM | admin.html'
          replacements = {
            'alert("Select tasks.");': 'showAppMessage("Select tasks.", "Tasks");',
            'alert("No rooms found.");': 'showAppMessage("No rooms found.", "Tasks");',
            'alert("Added " + addedCount + " missing tasks.");': 'showAppMessage("Added " + addedCount + " missing tasks.", "Tasks");',
            'alert("No matching tasks found.");': 'showAppMessage("No matching tasks found.", "Tasks");',
            'alert("Deleted " + tasksToDelete.length + " tasks.");': 'showAppMessage("Deleted " + tasksToDelete.length + " tasks.", "Tasks");',
            'alert("Area not found.");': 'showAppMessage("Area not found.", "Area");',
            'alert("Save area first.");': 'showAppMessage("Save area first.", "Tasks");',
            'alert("Fill task name.");': 'showAppMessage("Fill task name.", "Tasks");',
            'alert("No weekly rooms found for this day.");': 'showAppMessage("No weekly rooms found for this day.", "Tasks");',
            'alert("Fill assignment, task name, and schedule day.");': 'showAppMessage("Fill assignment, task name, and schedule day.", "Tasks");',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          text = text.replace('const ok = confirm("Add checked tasks to all " + areas.length + " areas? Duplicates will be skipped.");', 'const ok = await showAppConfirmMessage("Add checked tasks to all " + areas.length + " areas? Duplicates will be skipped.", "Tasks");')
          text = text.replace('const ok = confirm("Delete " + tasksToDelete.length + " matching tasks?");', 'const ok = await showAppConfirmMessage("Delete " + tasksToDelete.length + " matching tasks?", "Tasks");')
          text = text.replace('const ok = confirm("Delete " + tasksToDelete.length + " matching tasks from this area?");', 'const ok = await showAppConfirmMessage("Delete " + tasksToDelete.length + " matching tasks from this area?", "Tasks");')
          text = text.replace('const ok = confirm("Save this task to all " + areas.length + " weekly rooms for " + schedule + "?");', 'const ok = await showAppConfirmMessage("Save this task to all " + areas.length + " weekly rooms for " + schedule + "?", "Tasks");')
          text = text.replace('Updated: 2026-05-22 6:27 PM | admin.html', version)
          text = text.replace('Updated: 2026-05-22 6:15 PM | admin.html', version)
          text = text.replace('Updated: 2026-05-22 5:43 PM | admin.html', version)
          text = text.replace('const ADMIN_VISIBLE_VERSION_LABEL = "Updated: 2026-05-22 6:27 PM | admin.html";', 'const ADMIN_VISIBLE_VERSION_LABEL = "' + version + '";')
          p.write_text(text)
          PY
      - run: |
          git config user.name ChatGPT
          git config user.email chatgpt@users.noreply.github.com
          git add admin/admin.js
          git commit -m "Use custom popups for admin task tools" || exit 0
          git push
